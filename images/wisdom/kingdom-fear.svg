<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="fr-sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#061B26"/>
      <stop offset="60%" stop-color="#0E2E3D"/>
      <stop offset="100%" stop-color="#133845"/>
    </linearGradient>
    <radialGradient id="fr-mist" cx="0.5" cy="0.55" r="0.45">
      <stop offset="0%" stop-color="#2A6F7F" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#2A6F7F" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="400" height="300" fill="url(#fr-sky)"/>
  <!-- Stars -->
  <circle cx="50" cy="40" r="1" fill="#F4E9D2" opacity="0.7"/>
  <circle cx="120" cy="25" r="1.2" fill="#F4E9D2" opacity="0.5"/>
  <circle cx="280" cy="35" r="1" fill="#F4E9D2" opacity="0.6"/>
  <circle cx="350" cy="55" r="1.5" fill="#F4E9D2" opacity="0.8"/>
  <circle cx="180" cy="20" r="0.8" fill="#F4E9D2" opacity="0.4"/>
  <circle cx="240" cy="60" r="1" fill="#F4E9D2" opacity="0.5"/>
  <!-- Crescent moon -->
  <circle cx="80" cy="55" r="18" fill="#F4E9D2" opacity="0.85"/>
  <circle cx="88" cy="50" r="16" fill="#061B26"/>
  <!-- Misty glow -->
  <ellipse cx="200" cy="180" rx="180" ry="80" fill="url(#fr-mist)"/>
  <!-- Distant trees (lighter) -->
  <path d="M 0 220 L 20 180 L 40 220 Z M 30 220 L 55 170 L 80 220 Z M 70 220 L 95 175 L 120 220 Z M 110 220 L 135 165 L 160 220 Z M 250 220 L 275 170 L 300 220 Z M 290 220 L 315 165 L 340 220 Z M 330 220 L 360 175 L 390 220 Z" fill="#0B1E27" opacity="0.6"/>
  <!-- Front trees (silhouettes) -->
  <path d="M 0 300 L 0 200 L 30 140 L 60 300 Z" fill="#000"/>
  <path d="M 50 300 L 80 160 L 110 300 Z" fill="#000"/>
  <path d="M 280 300 L 310 150 L 340 300 Z" fill="#000"/>
  <path d="M 330 300 L 365 170 L 400 300 L 400 300 Z" fill="#000"/>
  <!-- Trunks -->
  <rect x="28" y="220" width="6" height="80" fill="#000"/>
  <rect x="78" y="220" width="5" height="80" fill="#000"/>
  <rect x="308" y="220" width="5" height="80" fill="#000"/>
  <rect x="363" y="220" width="6" height="80" fill="#000"/>
  <!-- Two glowing eyes peering from the dark -->
  <ellipse cx="185" cy="170" rx="6" ry="4" fill="#F2C849"/>
  <ellipse cx="215" cy="170" rx="6" ry="4" fill="#F2C849"/>
  <circle cx="186" cy="170" r="2" fill="#0B1E27"/>
  <circle cx="216" cy="170" r="2" fill="#0B1E27"/>
</svg>
