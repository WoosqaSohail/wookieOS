<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="sd-sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3F8694"/>
      <stop offset="60%" stop-color="#2A6F7F"/>
      <stop offset="100%" stop-color="#1F5563"/>
    </linearGradient>
    <linearGradient id="sd-sea" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#133845"/>
      <stop offset="100%" stop-color="#0E2E3D"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#sd-sky)"/>
  <!-- Soft clouds -->
  <ellipse cx="100" cy="60" rx="50" ry="12" fill="#F4E9D2" opacity="0.2"/>
  <ellipse cx="280" cy="45" rx="60" ry="10" fill="#F4E9D2" opacity="0.15"/>
  <ellipse cx="320" cy="80" rx="45" ry="10" fill="#F4E9D2" opacity="0.18"/>
  <!-- Main cloud (raining) -->
  <ellipse cx="200" cy="100" rx="55" ry="20" fill="#0E2E3D" opacity="0.7"/>
  <ellipse cx="175" cy="95" rx="30" ry="18" fill="#0E2E3D" opacity="0.7"/>
  <ellipse cx="225" cy="95" rx="32" ry="18" fill="#0E2E3D" opacity="0.7"/>
  <ellipse cx="200" cy="92" rx="35" ry="22" fill="#0B1E27" opacity="0.5"/>
  <!-- Rain drops -->
  <path d="M 170 130 L 167 145" stroke="#F4E9D2" stroke-width="1.5" opacity="0.7" stroke-linecap="round"/>
  <path d="M 185 135 L 182 152" stroke="#F4E9D2" stroke-width="1.5" opacity="0.7" stroke-linecap="round"/>
  <path d="M 200 130 L 197 150" stroke="#F4E9D2" stroke-width="1.5" opacity="0.7" stroke-linecap="round"/>
  <path d="M 215 138 L 212 155" stroke="#F4E9D2" stroke-width="1.5" opacity="0.7" stroke-linecap="round"/>
  <path d="M 230 132 L 227 148" stroke="#F4E9D2" stroke-width="1.5" opacity="0.7" stroke-linecap="round"/>
  <path d="M 175 155 L 172 170" stroke="#F4E9D2" stroke-width="1.5" opacity="0.5" stroke-linecap="round"/>
  <path d="M 205 162 L 202 178" stroke="#F4E9D2" stroke-width="1.5" opacity="0.5" stroke-linecap="round"/>
  <path d="M 225 160 L 222 175" stroke="#F4E9D2" stroke-width="1.5" opacity="0.5" stroke-linecap="round"/>
  <!-- Sea / wave horizon -->
  <rect x="0" y="220" width="400" height="80" fill="url(#sd-sea)"/>
  <path d="M 0 220 Q 50 215 100 220 T 200 220 T 300 220 T 400 220 L 400 230 Q 350 235 300 230 T 200 230 T 100 230 T 0 230 Z" fill="#0E2E3D" opacity="0.6"/>
  <!-- Wave lines -->
  <path d="M 30 245 Q 50 242 70 245 T 110 245" stroke="#F4E9D2" stroke-width="1" fill="none" opacity="0.3"/>
  <path d="M 240 255 Q 260 252 280 255 T 320 255" stroke="#F4E9D2" stroke-width="1" fill="none" opacity="0.3"/>
  <path d="M 140 270 Q 160 267 180 270 T 220 270" stroke="#F4E9D2" stroke-width="1" fill="none" opacity="0.3"/>
  <!-- Distant lone boat -->
  <path d="M 300 222 L 320 222 L 316 228 L 304 228 Z" fill="#0B1E27"/>
  <line x1="310" y1="222" x2="310" y2="210" stroke="#0B1E27" stroke-width="1.5"/>
</svg>
